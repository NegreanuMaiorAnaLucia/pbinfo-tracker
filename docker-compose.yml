services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment:
      APP_NAME: PbTrack
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pbtrack}
      DB_USERNAME: ${DB_USERNAME:-pbtrack}
      DB_PASSWORD: ${DB_PASSWORD:-pbtrack}
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build: .
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=1 --tries=2 --timeout=900
    volumes:
      - ./:/var/www/html
    environment:
      APP_NAME: PbTrack
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pbtrack}
      DB_USERNAME: ${DB_USERNAME:-pbtrack}
      DB_PASSWORD: ${DB_PASSWORD:-pbtrack}
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stderr
    depends_on:
      - app
      - redis
      - postgres

  scheduler:
    build: .
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_NAME: PbTrack
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pbtrack}
      DB_USERNAME: ${DB_USERNAME:-pbtrack}
      DB_PASSWORD: ${DB_PASSWORD:-pbtrack}
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stderr
    depends_on:
      - app
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pbtrack}
      POSTGRES_USER: ${DB_USERNAME:-pbtrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pbtrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pbtrack} -d ${DB_DATABASE:-pbtrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
