# Render Blueprint for PbTrack (free web service)
# https://dashboard.render.com/blueprints

services:
  - type: web
    name: pbinfo-tracker
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: PbTrack
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_ENCRYPT
        value: "false"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: APP_KEY
        sync: false
      - key: DB_URL
        sync: false
